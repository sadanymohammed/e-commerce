


<!-- ====== Header ====== -->
<header class="header">
  <!-- ====== Navigation ====== -->
  <nav class="navbar">
    <div class="container roww d-flex">
      <div class="logo">
        <img src="assets/images/logo.svg" alt="" />
      </div>

      <div class="nav-list d-flex"  >
        <a routerLink="/">Home</a>
        <a routerLink="pages">Pages</a>
         <a routerLink="collection" > Latest Collection </a>
        <a routerLink="/cart">Cart</a>
        <div class="close">
          <i class="bx bx-x"></i>
        </div>
        <a class="user-link">Login</a>
      </div>

      <div class="icons d-flex">
        <div class="icon d-flex"><i class="bx bx-search"></i></div>


      </div>

      <!-- Hamburger -->
      <div #container class="hamburger" (click)="toggleNav()"  >
        <i class="bx bx-menu-alt-right" [ngClass]="{ 'bx-x': isNavVisible }" ></i>
      </div>

      <div class="nav-list" [ngClass]="{ 'show': isNavVisible }">
        <div class="colum-links" *ngIf="isNavVisible" >
          <a routerLink="/">Home</a>
          <a routerLink="/cart">Shop</a>
          <a routerLink="collection" > Latest Collection </a>

          <a routerLink="pages" >Pages</a>
          <div class="close" (click)="toggleNav()">
            <i class="bx bx-x"></i>
          </div>

        </div>

      </div>
      </div>
    </nav>
